name: keep-streamlit-awake

# Keeps the RF jamming Streamlit Community Cloud demo awake so it stays a live
# backup alongside the always-on Hugging Face Spaces mirror. Streamlit Cloud
# sleeps after ~12h of no traffic; we render the app in a headless browser every
# 6h (>=2x margin), plus a manual "Run workflow" button to warm it on demand.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (sleep threshold is ~12h)
  workflow_dispatch: {}      # manual trigger from the Actions tab

# Don't pile up overlapping runs.
concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium only)
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Visit the Streamlit app
        run: node keepalive.js
